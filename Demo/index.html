<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirStrings Web SDK — Demo</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-alt: #232733;
      --border: #2e3345;
      --text: #e4e6ef;
      --text-muted: #8b8fa3;
      --accent: #6c8aff;
      --accent-dim: #4a62b3;
      --green: #4ade80;
      --orange: #fb923c;
      --red: #f87171;
      --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header h1 span { color: var(--accent); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .locale-switcher {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .locale-switcher button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 6px 14px;
      font-size: 13px;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.15s;
    }

    .locale-switcher button:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    .locale-switcher button.active {
      background: var(--accent);
      color: #fff;
    }

    .locale-switcher button:hover:not(.active) {
      background: var(--surface-alt);
      color: var(--text);
    }

    .btn {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--border); }
    .btn:active { transform: scale(0.97); }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .card-body { padding: 0; }

    .string-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .string-row:last-child { border-bottom: none; }

    .string-key {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .string-value {
      font-size: 14px;
      color: var(--text);
      text-align: right;
    }

    .string-value.fallback {
      color: var(--orange);
      font-style: italic;
    }

    .string-value .format-badge {
      display: inline-block;
      font-size: 10px;
      font-family: var(--mono);
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .format-badge.text {
      background: var(--surface-alt);
      color: var(--text-muted);
    }

    .format-badge.icu {
      background: rgba(108, 138, 255, 0.15);
      color: var(--accent);
    }

    .icu-demo {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .icu-demo:last-child { border-bottom: none; }

    .icu-demo-label {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-bottom: 6px;
    }

    .icu-demo-result {
      font-size: 15px;
      font-weight: 500;
    }

    .icu-args-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .icu-args-row label {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
    }

    .icu-args-row input[type="number"] {
      width: 80px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .icu-args-row input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .icu-args-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .icu-args-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .status-item {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .status-item:nth-child(even) { border-right: none; }
    .status-item:nth-last-child(-n+2) { border-bottom: none; }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .status-value {
      font-family: var(--mono);
      font-size: 14px;
    }

    .status-value.ready { color: var(--green); }
    .status-value.not-ready { color: var(--orange); }

    .event-log {
      max-height: 200px;
      overflow-y: auto;
      padding: 0;
    }

    .event-entry {
      padding: 8px 18px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
      display: flex;
      gap: 10px;
    }

    .event-entry:last-child { border-bottom: none; }

    .event-time { color: var(--text-muted); flex-shrink: 0; }
    .event-type { color: var(--accent); flex-shrink: 0; }
    .event-type.error { color: var(--red); }
    .event-detail { color: var(--text); }

    .empty-state {
      padding: 24px 18px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .key-fallback-section { margin-top: 8px; }

    @media (max-width: 600px) {
      .status-grid { grid-template-columns: 1fr; }
      .status-item { border-right: none !important; }
      .status-item:last-child { border-bottom: none; }
      .string-row { flex-direction: column; gap: 4px; }
      .string-value { text-align: left; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>AirStrings</span> Web SDK Demo</h1>
    <div class="header-controls">
      <div class="locale-switcher" id="locale-switcher"></div>
      <button class="btn" id="refresh-btn">Refresh</button>
    </div>
  </header>

  <main>
    <!-- Status Card -->
    <div class="card">
      <div class="card-header">SDK Status</div>
      <div class="card-body">
        <div class="status-grid" id="status-grid"></div>
      </div>
    </div>

    <!-- Plain Strings Card -->
    <div class="card">
      <div class="card-header">Plain Strings</div>
      <div class="card-body" id="strings-list"></div>
    </div>

    <!-- ICU Formatting Card -->
    <div class="card">
      <div class="card-header">ICU MessageFormat</div>
      <div class="card-body" id="icu-section"></div>
    </div>

    <!-- Fallback Behavior Card -->
    <div class="card">
      <div class="card-header">Fallback Behavior</div>
      <div class="card-body" id="fallback-section"></div>
    </div>

    <!-- Event Log Card -->
    <div class="card">
      <div class="card-header">Event Log</div>
      <div class="card-body event-log" id="event-log">
        <div class="empty-state">No events yet</div>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
